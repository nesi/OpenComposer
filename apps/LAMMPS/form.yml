---
form:
  partition:
    widget: select
    label: Partition
    options:
      - [ genoa, genoa, set-label-cores_memory_time_1: Number of cores, set-max-cores_memory_time_1: 166, set-label-cores_memory_time_2: Memory, set-max-cores_memory_time_2: 8, set-label-cores_memory_time_3: Run time (hours), set-max-cores_memory_time_3: 504, show-gpu_genoa, disable-gpu_milan, disable-number_of_gpus_milan]
      - [ milan, milan, set-label-cores_memory_time_1: Number of cores, set-max-cores_memory_time_1: 126, set-label-cores_memory_time_2: Memory, set-max-cores_memory_time_2: 8, set-label-cores_memory_time_3: Run time (hours), set-max-cores_memory_time_3: 504, show-gpu_milan, disable-gpu_genoa, disable-number_of_gpus_genoa]

  cores_memory_time:
    widget: number
    label: [Number of cores, Memory, Run time (hours)]
    size:  3
    value: [ 1, 2, 1]
    min:   [ 1, 1, 1]
    step:  [ 1, 1, 1]

  lammps_module:
    widget: module_load
    module: "LAMMPS"
    label: LAMMPS Module

  gpu_genoa:
    widget:   select
    label:    Type of GPU
    size:     1
    options:
      - [ "None", "", ]
      - [ "H100",  "h100", show-number_of_gpus_genoa]
      - [ "A100 (40GB)",  "a100", show-number_of_gpus_genoa]
      - [ "L4",  "l4", show-number_of_gpus_genoa]
    help: If you want to use the A100 (40GB) graphic card, switch Partition to milan.

  number_of_gpus_genoa:
    widget: select
    label: Number of GPUs
    options:
      - [ "1", "1"]
      - [ "2", "2"]
      - [ "3", "3"]
      - [ "4", "4"]

  gpu_milan:
    widget:   select
    label:    Type of GPU
    size:     1
    options:
      - [ "None", "", ]
      - [ "A100 (80GB)",  "a100", show-number_of_gpus_milan]
    help: If you want to use the H100, A100 (40GB), or L4 graphic card, switch Partition to genoa.

  number_of_gpus_milan:
    widget: select
    label: Number of GPUs
    options:
      - [ "1", "1"]
      - [ "2", "2"]
      - [ "3", "3"]
      - [ "4", "4"]

  show_advanced_option:
    widget: checkbox
    label:
    options:
      - ["Show advanced option", "", show-email, show-mail_option, show-array, show-log ]

  array:
    widget: number
    label: [ Array Job (start index), Array Job (last index), Array Job (jump) ]
    size: 3
    indent: 1
    min:  [0, 0, 1]
    help: Each job executed from an array job is assigned a task ID, which can be referenced in the shell script via the environment variable SLURM_ARRAY_TASK_ID.
    
  mail_option:
    label: Mail option
    widget: checkbox
    direction: horizontal
    separator: ","
    indent: 1
    options:
      - [ "Beginning of job execution", 'BEGIN',   enable-email ]
      - [ "End of job execution",       'END',     enable-email ]
      - [ "Fail of job",                'FAIL',    enable-email ]
      - [ "When the job is requeued",   'REQUEUE', enable-email ]
      - [ "All",                        'ALL',     enable-email ]

  email:
    widget: email
    label:  Email
    indent: 2

script: |
  #!/bin/bash -e
  #SBATCH --partition #{partition}
  #SBATCH --ntasks #{cores_memory_time_1}
  #SBATCH --mem-per-cpu #{cores_memory_time_2}G
  #SBATCH --time #{cores_memory_time_3}:00:00
  #SBATCH --array=#{array_1}-#{array_2}%#{array_3}
  #SBATCH --gpus-per-node=#{gpu_genoa}:#{number_of_gpus_genoa}
  #SBATCH --gpus-per-node=#{gpu_milan}:#{number_of_gpus_milan}
  #SBATCH --mail-type=#{mail_option}

  module purge
  module load #{lammps_module}

